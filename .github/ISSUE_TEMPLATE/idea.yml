name: Idea / feedback
description: A missing capability, confusing output, or an awkward step.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Ideas and feedback shape coyodex while it's young. No idea is too small.
  - type: textarea
    id: problem
    attributes:
      label: The problem or friction
      description: What were you trying to do, and where did coyodex get in the way or fall short?
      placeholder: When I have a large repo, the map is hard to navigate because…
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What you'd like instead
      description: How would you want it to work? A rough sketch is fine.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Which area?
      options:
        - The method (method.md / method/)
        - The skill / how it's driven
        - The map format
        - The viewer / diagrams
        - The Python tooling
        - Docs / onboarding
        - Other
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Examples, links, prior art, or context that helps.
    validations:
      required: false
